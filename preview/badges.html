<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--zd-font-sans)}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
/* Badge MD — matches storybook .md (22h, O10 text) */
.chip{
  display:inline-flex;align-items:center;gap:6px;
  height:var(--zd-badge-h-md);padding:0 var(--zd-badge-px-md);
  border-radius:var(--zd-radius-pill);
  font-family:var(--zd-font-sans);font-weight:var(--zd-fw-demi);
  font-size:var(--zd-badge-text-md-size);line-height:var(--zd-badge-text-md-lh);
  letter-spacing:var(--zd-o10-tracking);text-transform:uppercase;
  border:1px solid transparent;
}
.chip-pink{background:var(--zd-pink-50);color:var(--zd-pink-700)}
.chip-green{background:var(--zd-green-50);color:var(--zd-green-800)}
.chip-purple{background:var(--zd-purple-50);color:var(--zd-purple-700)}
.chip-orange{background:var(--zd-orange-50);color:var(--zd-orange-700)}
.chip-blue{background:var(--zd-blue-50);color:var(--zd-blue-700)}
.chip-grey{background:var(--zd-grey-100);color:var(--zd-grey-700)}
.chip-solid{background:var(--zd-brand);color:#fff}
.chip-dark{background:var(--zd-grey-900);color:#fff}
</style></head><body>
<div class="row">
  <span class="chip chip-pink">Bestseller</span>
  <span class="chip chip-green">₹26 saved</span>
  <span class="chip chip-purple">Pass only</span>
  <span class="chip chip-orange">Limited</span>
  <span class="chip chip-blue">New</span>
  <span class="chip chip-grey">Out of stock</span>
  <span class="chip chip-solid">50% OFF</span>
  <span class="chip chip-dark">Buy 2 get 1</span>
</div>
<div style="margin-top:14px;font-size:var(--zd-b12-size);line-height:var(--zd-b12-lh);color:var(--zd-text-tertiary)">Badge MD · 22px · O10 · uppercase. Single source: <code>--zd-badge-*</code> tokens.</div>
</body></html>
