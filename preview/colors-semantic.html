<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--zd-font-sans)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.card{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--zd-border);border-radius:10px}
.dot{width:32px;height:32px;border-radius:8px;flex-shrink:0;border:1px solid #00000010}
.lbl{font-size:11px;color:var(--zd-text-secondary)}
.val{font-size:13px;font-weight:600;color:var(--zd-text)}
</style></head><body>
<div class="grid">
  <div class="card"><div class="dot" style="background:#329537"></div><div><div class="val">Success</div><div class="lbl">green-800</div></div></div>
  <div class="card"><div class="dot" style="background:#ed2724"></div><div><div class="val">Error</div><div class="lbl">red-600</div></div></div>
  <div class="card"><div class="dot" style="background:#ee7c30"></div><div><div class="val">Warning</div><div class="lbl">orange-600</div></div></div>
  <div class="card"><div class="dot" style="background:#1681f3"></div><div><div class="val">Highlight</div><div class="lbl">blue-600</div></div></div>
  <div class="card"><div class="dot" style="background:#2da3b4"></div><div><div class="val">Accent</div><div class="lbl">teal-700</div></div></div>
  <div class="card"><div class="dot" style="background:#9a16ca"></div><div><div class="val">Brand-Primary</div><div class="lbl">purple-700</div></div></div>
  <div class="card"><div class="dot" style="background:#f9105e"></div><div><div class="val">Brand</div><div class="lbl">pink-600</div></div></div>
  <div class="card"><div class="dot" style="background:#329537"></div><div><div class="val">Super Saver</div><div class="lbl">green-800</div></div></div>
</div>
</body></html>
