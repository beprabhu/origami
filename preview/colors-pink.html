<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sw{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--zd-font-sans);font-size:11px;color:var(--zd-text-secondary)}
.sw .chip{width:64px;height:64px;border-radius:12px;border:1px solid var(--zd-border)}
.sw code{font-family:ui-monospace,Menlo,monospace;color:var(--zd-text)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#fceef2"></div><span>50</span><code>#fceef2</code></div>
  <div class="sw"><div class="chip" style="background:#fed2e1"></div><span>100</span><code>#fed2e1</code></div>
  <div class="sw"><div class="chip" style="background:#fdaac6"></div><span>200</span><code>#fdaac6</code></div>
  <div class="sw"><div class="chip" style="background:#fc79a6"></div><span>300</span><code>#fc79a6</code></div>
  <div class="sw"><div class="chip" style="background:#fb6094"></div><span>400</span><code>#fb6094</code></div>
  <div class="sw"><div class="chip" style="background:#fa3778"></div><span>500</span><code>#fa3778</code></div>
  <div class="sw"><div class="chip" style="background:#f9105e;box-shadow:0 0 0 2px #f9105e30"></div><span style="font-weight:700;color:#f9105e">600 ★</span><code>#f9105e</code></div>
  <div class="sw"><div class="chip" style="background:#db064d"></div><span>700</span><code>#db064d</code></div>
  <div class="sw"><div class="chip" style="background:#ae043d"></div><span>800</span><code>#ae043d</code></div>
  <div class="sw"><div class="chip" style="background:#7c0e32"></div><span>900</span><code>#7c0e32</code></div>
</div>
</body></html>
