<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:var(--zd-surface-primary);font-family:var(--zd-font-sans)}
h3{margin:0 0 4px;font-size:14px;font-weight:600;color:var(--zd-text-primary);text-transform:capitalize}
p{margin:0 0 14px;font-size:12px;line-height:16px;color:var(--zd-text-secondary)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.card{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--zd-border-default);border-radius:8px;background:var(--zd-surface-primary)}
.chip{width:36px;height:36px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.06)}
.meta{min-width:0;flex:1}
.step{font-size:13px;font-weight:600;color:var(--zd-text-primary)}
.tok,.hex{display:block;font-family:var(--zd-font-mono,ui-monospace,Menlo,monospace);font-size:10px;line-height:14px;color:var(--zd-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hex{color:var(--zd-text-tertiary)}
</style></head><body>
<h3>yellow</h3>
<p>Caution, promo accents.</p>
<div class="grid" id="g"></div>
<script>
const STEPS=[50,100,200,300,400,500,600,700,800,900];
const root=getComputedStyle(document.documentElement);
const g=document.getElementById('g');
for(const s of STEPS){
  const tok='--zd-yellow-'+s;
  const hex=root.getPropertyValue(tok).trim();
  const el=document.createElement('div');el.className='card';
  el.innerHTML='<div class="chip" style="background:var('+tok+')"></div><div class="meta"><div class="step">'+s+'</div><code class="tok">'+tok+'</code><code class="hex">'+hex+'</code></div>';
  g.appendChild(el);
}
</script>
</body></html>
