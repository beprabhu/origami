<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Origami · ProductCard</title>
<link rel="stylesheet" href="../storybook-app/src/styles/tokens.css">
<link rel="stylesheet" href="../storybook-app/src/components/Badge/Badge.css">
<link rel="stylesheet" href="../storybook-app/src/components/Button/Button.css">
<link rel="stylesheet" href="../storybook-app/src/components/ProductCard/ProductCard.css">
<style>
  body {
    margin: 0;
    padding: 24px;
    background: var(--zd-surface-primary);
    font-family: var(--zd-font-sans);
  }
  .zd-pcard { margin: 0; }
  /* Inline icon sizing for the SVGs in this preview */
  .zd-pcard__heart svg,
  .zd-pcard__rating-star svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>

<article class="zd-pcard">
  <div class="zd-pcard__header">
    <!-- "Best Value" pill — reuses Badge: warning tone, subtle variant, sm size -->
    <span class="zd-pcard__pill">
      <span class="zd-badge zd-badge--sm zd-badge--warningSubtle">Best Value</span>
    </span>

    <!-- Wishlist heart -->
    <button class="zd-pcard__heart" aria-label="Add to wishlist" aria-pressed="false">
      <svg viewBox="0 0 256 256" fill="currentColor" aria-hidden><path d="M178,36c-20.09,0-37.92,7.93-50,21.56C115.92,43.93,98.09,36,78,36a66.08,66.08,0,0,0-66,66c0,72.34,105.81,130.14,110.31,132.57a12,12,0,0,0,11.38,0C138.19,232.14,244,174.34,244,102A66.08,66.08,0,0,0,178,36Zm-5.49,142.36A328.69,328.69,0,0,1,128,210.16a328.69,328.69,0,0,1-44.51-31.8C61.82,159.77,36,131.42,36,102A42,42,0,0,1,78,60c19.45,0,35.78,10.36,42.6,27a8,8,0,0,0,14.8,0c6.82-16.67,23.15-27,42.6-27a46.06,46.06,0,0,1,46,46C220,155.61,146.24,204.15,128,214.8Z"/></svg>
    </button>

    <div class="zd-pcard__image">
      <img src="assets/akshayakalpa-cow-milk.png" alt="Akshayakalpa Organic Cow Milk 500ml pack">
    </div>

    <div class="zd-pcard__quantity">
      <span class="zd-pcard__quantity-count">500 ml</span>
      <span class="zd-pcard__quantity-rate">₹100/ L</span>
    </div>

    <!-- ADD button — reuses Button: secondary variant, sm size -->
    <div class="zd-pcard__add">
      <button class="zd-btn zd-btn--sm zd-btn--secondary">ADD</button>
    </div>
  </div>

  <div class="zd-pcard__body">
    <div class="zd-pcard__price">
      <span class="zd-pcard__sp">
        <span class="zd-pcard__sp-rupee">₹</span>
        <span class="zd-pcard__sp-amount">50</span>
      </span>
      <span class="zd-pcard__mrp">₹65</span>
    </div>

    <div class="zd-pcard__savings">
      <span class="zd-pcard__savings-amount">₹15 OFF</span>
      <span class="zd-pcard__savings-divider"></span>
    </div>

    <h3 class="zd-pcard__title">Akshayakalpa Organic Pasteurized Cow Milk</h3>

    <!-- Attribute tags — reuses Badge: neutral tone, subtle variant, sm size -->
    <div class="zd-pcard__tags">
      <span class="zd-badge zd-badge--sm zd-badge--neutralSubtle">500ml</span>
      <span class="zd-badge zd-badge--sm zd-badge--neutralSubtle">A2 Protein</span>
    </div>

    <div class="zd-pcard__rating">
      <span class="zd-pcard__rating-star">
        <svg viewBox="0 0 256 256" fill="currentColor" aria-hidden><path d="M234.29,114.85l-45,38.83L203,211.75a16.4,16.4,0,0,1-24.5,17.82L128,198.49,77.47,229.57A16.4,16.4,0,0,1,53,211.75l13.76-58.07-45-38.83A16.46,16.46,0,0,1,31.08,86l59-4.76,22.76-55.08a16.36,16.36,0,0,1,30.27,0l22.75,55.08,59,4.76a16.46,16.46,0,0,1,9.37,28.86Z"/></svg>
      </span>
      <span class="zd-pcard__rating-score">4.6</span>
      <span class="zd-pcard__rating-count">(312)</span>
    </div>
  </div>
</article>

</body>
</html>
