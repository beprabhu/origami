<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../storybook-app/src/styles/tokens.css"><style>
body{margin:0;padding:24px;background:var(--zd-grey-50);font-family:var(--zd-font-sans)}
.row{display:flex;gap:18px;align-items:center}
.box{width:80px;height:60px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--zd-text-secondary)}
.tag{font-size:11px;color:var(--zd-text-tertiary);margin-top:8px;text-align:center;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div><div class="box" style="box-shadow:var(--zd-shadow-xs)"></div><div class="tag">xs</div></div>
  <div><div class="box" style="box-shadow:var(--zd-shadow-sm)"></div><div class="tag">sm</div></div>
  <div><div class="box" style="box-shadow:var(--zd-shadow-md)"></div><div class="tag">md</div></div>
  <div><div class="box" style="box-shadow:var(--zd-shadow-lg)"></div><div class="tag">lg</div></div>
  <div><div class="box" style="box-shadow:var(--zd-shadow-xl)"></div><div class="tag">xl</div></div>
  <div><div class="box" style="box-shadow:var(--zd-shadow-brand);background:#f9105e;color:#fff">CTA</div><div class="tag">brand</div></div>
</div>
</body></html>
