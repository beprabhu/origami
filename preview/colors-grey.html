<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sw{display:flex;flex-direction:column;align-items:center;gap:6px;font-family:var(--zd-font-sans);font-size:11px;color:var(--zd-text-secondary)}
.sw .chip{width:64px;height:64px;border-radius:12px;border:1px solid var(--zd-border)}
.sw code{font-family:ui-monospace,Menlo,monospace;color:var(--zd-text)}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#ffffff"></div><span>white</span><code>#ffffff</code></div>
  <div class="sw"><div class="chip" style="background:#f3f5f7"></div><span>50</span><code>#f3f5f7</code></div>
  <div class="sw"><div class="chip" style="background:#eaedf1"></div><span>100</span><code>#eaedf1</code></div>
  <div class="sw"><div class="chip" style="background:#dfe4ec"></div><span>200</span><code>#dfe4ec</code></div>
  <div class="sw"><div class="chip" style="background:#c2c9d6"></div><span>300</span><code>#c2c9d6</code></div>
  <div class="sw"><div class="chip" style="background:#8b96a7"></div><span>400</span><code>#8b96a7</code></div>
  <div class="sw"><div class="chip" style="background:#586274"></div><span style="color:#586274">500</span><code>#586274</code></div>
  <div class="sw"><div class="chip" style="background:#424957"></div><span>600</span><code>#424957</code></div>
  <div class="sw"><div class="chip" style="background:#2e3642"></div><span>700</span><code>#2e3642</code></div>
  <div class="sw"><div class="chip" style="background:#1e242e"></div><span>800</span><code>#1e242e</code></div>
  <div class="sw"><div class="chip" style="background:#101418"></div><span>900</span><code>#101418</code></div>
</div>
</body></html>
