<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--zd-font-sans)}
.row{display:flex;align-items:flex-end;gap:12px}
.box{background:var(--zd-pink-100);border:1px dashed var(--zd-pink-400);height:48px}
.box .lbl{font-size:11px;color:var(--zd-pink-800);padding:4px;font-weight:600}
.tag{font-size:11px;color:var(--zd-text-tertiary);text-align:center;margin-top:6px;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div><div class="box" style="width:4px"></div><div class="tag">1 · 4</div></div>
  <div><div class="box" style="width:8px"></div><div class="tag">2 · 8</div></div>
  <div><div class="box" style="width:12px"></div><div class="tag">3 · 12</div></div>
  <div><div class="box" style="width:16px"></div><div class="tag">4 · 16</div></div>
  <div><div class="box" style="width:20px"></div><div class="tag">5 · 20</div></div>
  <div><div class="box" style="width:24px"></div><div class="tag">6 · 24</div></div>
  <div><div class="box" style="width:32px"></div><div class="tag">7 · 32</div></div>
  <div><div class="box" style="width:40px"></div><div class="tag">8 · 40</div></div>
  <div><div class="box" style="width:48px"></div><div class="tag">9 · 48</div></div>
  <div><div class="box" style="width:64px"></div><div class="tag">10 · 64</div></div>
</div>
<div style="margin-top:14px;font-size:12px;color:var(--zd-text-secondary)">4px grid — <code>--zd-space-1</code> through <code>--zd-space-10</code></div>
</body></html>
