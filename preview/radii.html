<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--zd-font-sans)}
.row{display:flex;gap:14px;align-items:flex-end}
.box{width:64px;height:64px;background:var(--zd-grey-100);border:1px solid var(--zd-border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--zd-text-secondary)}
.tag{font-size:11px;color:var(--zd-text-tertiary);margin-top:6px;text-align:center;font-variant-numeric:tabular-nums}
</style></head><body>
<div class="row">
  <div><div class="box" style="border-radius:4px"></div><div class="tag">xs · 4</div></div>
  <div><div class="box" style="border-radius:6px"></div><div class="tag">sm · 6</div></div>
  <div><div class="box" style="border-radius:8px"></div><div class="tag">md · 8</div></div>
  <div><div class="box" style="border-radius:12px"></div><div class="tag">lg · 12</div></div>
  <div><div class="box" style="border-radius:16px"></div><div class="tag">xl · 16</div></div>
  <div><div class="box" style="border-radius:20px"></div><div class="tag">2xl · 20</div></div>
  <div><div class="box" style="border-radius:999px"></div><div class="tag">pill</div></div>
</div>
</body></html>
