<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../storybook-app/src/styles/tokens.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--zd-font-sans)}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;padding:12px;border:1px solid var(--zd-border);border-radius:10px}
.glyph{font-size:48px;color:var(--zd-text-primary)}
.tag{font-size:11px;color:var(--zd-text-secondary);font-variant-numeric:tabular-nums}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="glyph" style="font-weight:400">Aa</div><div class="tag">400 · Regular</div></div>
  <div class="cell"><div class="glyph" style="font-weight:500">Aa</div><div class="tag">500 · Medium</div></div>
  <div class="cell"><div class="glyph" style="font-weight:600">Aa</div><div class="tag">600 · DemiBold</div></div>
  <div class="cell"><div class="glyph" style="font-weight:700">Aa</div><div class="tag">700 · Bold</div></div>
  <div class="cell"><div class="glyph" style="font-weight:900">Aa</div><div class="tag">900 · Black</div></div>
</div>
<div style="margin-top:16px;font-size:12px;color:var(--zd-text-tertiary)">Family: <code style="font-family:ui-monospace,monospace">"Zepto Norms"</code> — single family across the system.</div>
</body></html>
