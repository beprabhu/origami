<!doctype html>
<html>
<head>

<body>

    <div><button class="zd-btn zd-btn--primary zd-btn--sm">SM</button><div class="tag">32 · A12</div></div>
    <div><button class="zd-btn zd-btn--primary zd-btn--md">MD</button><div class="tag">40 · A14</div></div>

</html>
