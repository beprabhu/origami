<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../storybook-app/src/styles/tokens.css">
<link rel="stylesheet" href="../storybook-app/src/components/Button/Button.css">
<style>
  body { margin: 0; padding: 24px; background: var(--zd-surface-primary); font-family: var(--zd-font-sans); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .lbl {
    font-size: var(--zd-o10-size);
    line-height: var(--zd-o10-lh);
    color: var(--zd-text-tertiary);
    margin: 14px 0 8px;
    text-transform: uppercase;
    letter-spacing: var(--zd-o10-tracking);
  }
  .lbl:first-child { margin-top: 0; }
  /* Inline icon slot for the preview's SVG glyphs */
  .zd-btn__icon svg { width: 14px; height: 14px; display: block; }
  .zd-btn__icon svg path { fill: currentColor; }
</style>
</head>
<body>

<div class="lbl">Default · md / 40px · A14</div>
<div class="row">
  <button class="zd-btn zd-btn--md zd-btn--primary">Primary</button>
  <button class="zd-btn zd-btn--md zd-btn--secondary">Secondary</button>
  <button class="zd-btn zd-btn--md zd-btn--tertiary">Tertiary</button>
  <button class="zd-btn zd-btn--md zd-btn--neutral">Neutral</button>
  <button class="zd-btn zd-btn--md zd-btn--linkSecondary">Link secondary</button>
  <button class="zd-btn zd-btn--md zd-btn--linkNeutral">Link neutral</button>
  <button class="zd-btn zd-btn--md zd-btn--superSaver">Super Saver</button>
  <button class="zd-btn zd-btn--md zd-btn--superSaverOutline">Super Saver outline</button>
</div>

<div class="lbl">Disabled</div>
<div class="row">
  <button class="zd-btn zd-btn--md zd-btn--primary" disabled>Primary</button>
  <button class="zd-btn zd-btn--md zd-btn--secondary" disabled>Secondary</button>
  <button class="zd-btn zd-btn--md zd-btn--tertiary" disabled>Tertiary</button>
  <button class="zd-btn zd-btn--md zd-btn--neutral" disabled>Neutral</button>
  <button class="zd-btn zd-btn--md zd-btn--linkSecondary" disabled>Link secondary</button>
  <button class="zd-btn zd-btn--md zd-btn--superSaver" disabled>Super Saver</button>
  <button class="zd-btn zd-btn--md zd-btn--superSaverOutline" disabled>Super Saver outline</button>
</div>
