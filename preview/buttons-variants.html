<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#fff;font-family:var(--zd-font-sans)}
/* Button base — token-driven, mirrors storybook-app/src/components/Button/Button.module.css */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:var(--zd-space-2);
  font-family:var(--zd-font-sans);font-weight:var(--zd-fw-demi);
  border:1px solid transparent;cursor:pointer;
  height:var(--zd-btn-h-md);padding:0 var(--zd-btn-px-md);
  font-size:var(--zd-btn-text-md-size);line-height:var(--zd-btn-text-md-lh);
  letter-spacing:var(--zd-a14-tracking);border-radius:var(--zd-btn-r-md);
  transition:background-color var(--zd-dur-fast) var(--zd-ease-standard);
}
.btn-primary{background:var(--zd-brand);color:#fff;border-color:var(--zd-brand)}
.btn-primary:hover{background:var(--zd-brand-hover);border-color:var(--zd-brand-hover)}
.btn-secondary{background:#fff;color:var(--zd-brand);border-color:var(--zd-brand)}
.btn-secondary:hover{background:var(--zd-brand-subtle)}
.btn-tertiary{background:transparent;color:var(--zd-text)}
.btn-tertiary:hover{background:var(--zd-grey-100)}
.btn-neutral{background:var(--zd-grey-900);color:#fff;border-color:var(--zd-grey-900)}
.btn-neutral:hover{background:var(--zd-grey-800);border-color:var(--zd-grey-800)}
.btn-ghost{background:transparent;color:var(--zd-brand)}
.btn-ghost:hover{background:var(--zd-brand-subtle)}
.btn-disabled{background:var(--zd-grey-100);color:var(--zd-text-disabled);border-color:var(--zd-grey-100);cursor:not-allowed}
.row{display:flex;gap:10px;flex-wrap:wrap}
.lbl{font-size:var(--zd-o10-size);line-height:var(--zd-o10-lh);color:var(--zd-text-tertiary);margin-bottom:8px;text-transform:uppercase;letter-spacing:var(--zd-o10-tracking)}
.section{margin-bottom:14px}
</style></head><body>
<div class="section">
  <div class="lbl">Variants · md / 40px · A14</div>
  <div class="row">
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-tertiary">Tertiary</button>
    <button class="btn btn-neutral">Neutral</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-disabled" disabled>Disabled</button>
  </div>
</div>
</body></html>
