<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../storybook-app/src/styles/tokens.css">
<link rel="stylesheet" href="../storybook-app/src/components/Input/Input.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: var(--zd-font-sans); }
  .zd-input-field { margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="zd-input-field">
    <label class="zd-input__label">Mobile number</label>
    <div class="zd-input"><input class="zd-input__control" value="+91 98 765 4321"></div>
  </div>
  <div class="zd-input-field">
    <label class="zd-input__label">Pincode</label>
    <div class="zd-input zd-input--error"><input class="zd-input__control" value="40005"></div>
    <span class="zd-input__helper zd-input__helper--error">Enter a valid 6-digit pincode</span>
  </div>
  <div class="zd-input-field">
    <label class="zd-input__label">Delivery slot</label>
    <div class="zd-input">
      <select class="zd-input__control"><option>Express · 10 min</option><option>Scheduled · today</option></select>
    </div>
  </div>
</body>
</html>
