<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#fff;font-family:var(--zd-font-sans)}
.row{display:flex;gap:14px}
.brand{flex:1;padding:18px;border-radius:14px;color:#fff}
.label{font-size:10px;letter-spacing:0.5px;text-transform:uppercase;opacity:0.85;font-weight:600}
.title{font-size:18px;font-weight:700;margin-top:6px}
.swatches{display:flex;gap:6px;margin-top:14px}
.swatches span{width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,0.2)}
</style></head><body>
<div class="row">
  <div class="brand" style="background:#f9105e">
    <div class="label">Default</div><div class="title">Zepto</div>
    <div class="swatches"><span style="background:#fceef2"></span><span style="background:#fa3778"></span><span style="background:#db064d"></span><span style="background:#329537"></span></div>
  </div>
  <div class="brand" style="background:#1f1537;background-image:radial-gradient(at 20% 30%,#967ece80,transparent 60%)">
    <div class="label" style="color:#cf65f5">Membership</div><div class="title">Zepto Pass</div>
    <div class="swatches"><span style="background:#332060"></span><span style="background:#967ece"></span><span style="background:#cf65f5"></span><span style="background:#efe9fb"></span></div>
  </div>
  <div class="brand" style="background:#103520">
    <div class="label" style="color:#ffe852">Subscription</div><div class="title">Daily Pass</div>
    <div class="swatches"><span style="background:#084121"></span><span style="background:#5a9674"></span><span style="background:#ffe852"></span><span style="background:#fffee9"></span></div>
  </div>
</div>
</body></html>
