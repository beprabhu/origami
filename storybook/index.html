<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zepto Storybook</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root { --sb-bg:#f6f7f9; --sb-side:#0f1115; --sb-side-fg:#cdd3dc; --sb-side-fg-mute:#7c8493; --sb-side-active:#f9105e; --sb-canvas:#fff; --sb-border:#e6e9ef; }
  html, body { margin:0; padding:0; height:100%; background:var(--sb-bg); font-family: var(--zd-font-sans); color:#0f1115; }
  .app { display:grid; grid-template-columns: 240px 1fr; height:100vh; }
  /* Sidebar */
  .side { background: var(--sb-side); color: var(--sb-side-fg); overflow-y:auto; padding: 14px 0; }
  .side .brand { display:flex; align-items:center; gap:8px; padding: 6px 16px 14px; }
  .side .brand .dot { width:18px; height:18px; border-radius:5px; background: var(--sb-side-active); }
  .side .brand b { font-size:14px; font-weight:700; letter-spacing:-0.1px; color:#fff; }
  .side .brand span { font-size:10px; color: var(--sb-side-fg-mute); text-transform:uppercase; letter-spacing:1px; }
  .side h4 {
    margin: 14px 14px 4px; padding: 0 4px;
    font-size: 10px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    color: var(--sb-side-fg-mute);
  }
  .side .item {
    display:flex; align-items:center; gap:8px; cursor:pointer;
    padding: 6px 18px; font-size: 12.5px; color: var(--sb-side-fg);
    border-left: 2px solid transparent;
  }
  .side .item:hover { background: rgba(255,255,255,0.04); color:#fff; }
  .side .item.active { background: rgba(249,16,94,0.10); color:#fff; border-left-color: var(--sb-side-active); }
  .side .item .glyph { color: var(--sb-side-fg-mute); font-size: 10px; }

  /* Main */
  .main { overflow:hidden; display:flex; flex-direction:column; }
  .toolbar {
    height: 44px; background:#fff; border-bottom:1px solid var(--sb-border);
    display:flex; align-items:center; gap:14px; padding: 0 16px;
  }
  .toolbar .crumbs { font-size: 12px; color:#6b7280; }
  .toolbar .crumbs b { color:#0f1115; font-weight:600; }
  .toolbar .spacer { flex:1; }
  .toolbar .tab {
    font-size: 12px; padding: 6px 10px; border-radius:6px; cursor:pointer;
    color:#5b6373;
  }
  .toolbar .tab.active { background:#f1f3f7; color:#0f1115; font-weight:600; }
  .toolbar .actions { display:flex; gap:6px; align-items:center; }
  .iconbtn { width:28px; height:28px; border-radius:6px; border:1px solid var(--sb-border); background:#fff; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:#5b6373; }

  .canvas { flex:1; background: var(--sb-bg); padding: 24px; overflow:auto; }
  .stage {
    background: var(--sb-canvas); border:1px solid var(--sb-border); border-radius:10px;
    min-height: 100%; padding: 28px;
    background-image:
      linear-gradient(rgba(15,17,21,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,17,21,0.04) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .docs h1 { font-size: 20px; margin: 0 0 6px; font-weight: 700; }
  .docs .desc { color:#5b6373; font-size: 13px; margin: 0 0 18px; max-width: 720px; }
  .docs h3 { font-size: 13px; font-weight: 700; margin: 22px 0 10px; color:#0f1115; }
  .docs .row {
    display:flex; flex-wrap:wrap; gap:18px; align-items:flex-start;
    background:#fff; border:1px solid var(--sb-border); border-radius:10px; padding: 22px;
  }
  .row.center { justify-content:center; }
  .row.tight { padding:0; }
  .row.tight iframe { display:block; border:none; border-radius:10px; }
  .grid { display:grid; gap:14px; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .swatch-card {
    background:#fff; border:1px solid var(--sb-border); border-radius:8px; padding:12px;
    display:flex; gap:10px; align-items:center;
  }
  .swatch { width:36px; height:36px; border-radius:6px; flex-shrink:0; border:1px solid rgba(0,0,0,0.06); }
  .swatch-meta { font-size:11px; color:#5b6373; line-height: 1.3; }
  .swatch-meta b { display:block; color:#0f1115; font-size: 12px; font-weight:600; margin-bottom:2px; }
  .mono { font-family: var(--zd-font-mono); font-size: 10.5px; color:#7c8493; }

  .props {
    margin-top: 18px; background:#fff; border:1px solid var(--sb-border); border-radius:10px; overflow:hidden;
  }
  .props .head {
    padding: 8px 14px; font-size:11px; font-weight:700; letter-spacing:0.6px; text-transform:uppercase;
    color:#5b6373; background:#f7f8fa; border-bottom:1px solid var(--sb-border);
  }
  .props table { width:100%; border-collapse: collapse; font-size:12px; }
  .props td, .props th { padding: 8px 14px; text-align:left; border-bottom:1px solid var(--sb-border); vertical-align: top; }
  .props th { font-weight:600; color:#0f1115; background:#fafbfc; font-size:11px; }
  .props tr:last-child td { border-bottom: none; }
  .props code { background:#f3f4f6; padding:1px 5px; border-radius:4px; font-family: var(--zd-font-mono); font-size:11px; color:#9a116b; }

  .specimen {
    display:flex; flex-direction:column; gap:12px; align-items:flex-start;
    background:#fff; border:1px solid var(--sb-border); border-radius:10px; padding: 22px;
  }
  .specimen .label { font-size:10px; color:#7c8493; text-transform:uppercase; letter-spacing:0.8px; }

  /* Phone frame for app stories */
  .phone-shell {
    width: 320px; min-height: 580px; background:#fff;
    border-radius: 24px; overflow: hidden;
    box-shadow: 0 8px 30px rgba(15,17,21,0.10), 0 0 0 1px rgba(15,17,21,0.06);
    display: flex; flex-direction: column;
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <div class="dot"></div>
      <div>
        <b>Zepto</b><br>
        <span>Storybook · v1.0</span>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <main class="main">
    <div class="toolbar">
      <div class="crumbs"><span id="crumb-section">Foundations</span> / <b id="crumb-name">Colors</b></div>
      <div class="spacer"></div>
      <div class="tab active">Canvas</div>
      <div class="tab">Docs</div>
      <div class="tab">Code</div>
      <div class="actions">
        <button class="iconbtn" title="Refresh">↻</button>
      </div>
    </div>
    <div class="canvas" id="canvas"></div>
  </main>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Source components -->
<script type="text/babel" src="../ui_kits/zepto-app/icons.jsx"></script>
<script type="text/babel" src="../ui_kits/zepto-app/Chrome.jsx"></script>
<script type="text/babel" src="../ui_kits/zepto-app/Products.jsx"></script>
<script type="text/babel" src="../ui_kits/zepto-app/Home.jsx"></script>
<script type="text/babel" src="../ui_kits/zepto-app/Cart.jsx"></script>
<script type="text/babel" src="../ui_kits/zepto-app/OrderTracker.jsx"></script>

<script type="text/babel" src="storybook-stories.jsx"></script>
<script type="text/babel" src="storybook-app.jsx"></script>
</body>
</html>
