<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zepto — App UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; min-height:100%; background:#0b0c0e; }
  #root { width:100%; min-height:100vh; display:flex; align-items:flex-start; justify-content:center; padding: 16px 0; }
  .stage { display:flex; gap:16px; align-items:center; padding:16px; }
  .label { color:#8b96a7; font-size:12px; font-family: var(--zd-font-sans); text-align:center; margin-top:8px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Products.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Cart.jsx"></script>
<script type="text/babel" src="OrderTracker.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
const { IOSDevice } = window;
function Stage() {
  return (
    <div className="stage">
      <IOSDevice width={375} height={720}>
        <App />
      </IOSDevice>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Stage />);
</script>

</html>
